version: '3.9'

services:
  db:
    image: postgres:16
    container_name: rails_db
    environment:
      POSTGRES_USER: rails
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myapp_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  web:
    image: rails_8_api
    container_name: rails_8_api
    depends_on:
      - db
    ports:
      - '3001:80'
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://rails:password@db:5432/myapp_prod
    command: ['./bin/rails', 'server']
    volumes:
      - .:/rails

volumes:
  postgres_data:
